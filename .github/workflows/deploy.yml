name: Build & Deploy

on:
  # Disabled: Pagefind build OOMs on GitHub Actions runner (7GB limit).
  # Deploy locally instead: npx wrangler pages deploy . --project-name=readzen --branch=main
  # See README.md for full instructions.
  #
  # push:
  #   branches: [main]
  workflow_dispatch:  # manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout SPA
        uses: actions/checkout@v4

      - name: Checkout CBETA texts
        uses: actions/checkout@v4
        with:
          repository: Fabulu/CbetaZenTexts
          path: corpus/CbetaZenTexts
          token: ${{ secrets.CORPUS_TOKEN }}

      - name: Checkout CBETA translations
        uses: actions/checkout@v4
        with:
          repository: Fabulu/CbetaZenTranslations
          path: corpus/CbetaZenTranslations
          token: ${{ secrets.CORPUS_TOKEN }}

      - name: Checkout OpenZen texts
        uses: actions/checkout@v4
        with:
          repository: Fabulu/OpenZenTexts
          path: corpus/OpenZenTexts
          token: ${{ secrets.CORPUS_TOKEN }}

      - name: Checkout OpenZen translations
        uses: actions/checkout@v4
        with:
          repository: Fabulu/OpenZenTranslations
          path: corpus/OpenZenTranslations
          token: ${{ secrets.CORPUS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build dictionary shards
        run: node build/build-dict-shards.js

      - name: Cache Pagefind index
        id: pagefind-cache
        uses: actions/cache@v4
        with:
          path: pagefind
          key: pagefind-v2-${{ hashFiles('build/build-pagefind-index.js') }}
          restore-keys: |
            pagefind-v2-
            pagefind-

      - name: Restore Pagefind from live site (fallback)
        if: ${{ steps.pagefind-cache.outputs.cache-hit != 'true' }}
        run: |
          echo "No cached Pagefind index found. Downloading from live site..."
          mkdir -p pagefind
          # Download the entry point to check if live site has pagefind
          curl -sf "https://readzen.net/pagefind/pagefind-entry.json" -o pagefind/pagefind-entry.json || true
          if [ -f pagefind/pagefind-entry.json ]; then
            echo "Live pagefind-entry.json found, but cannot bulk-download shards."
            echo "Will attempt local build. If it OOMs, use [skip-pagefind] in commit message."
            rm -rf pagefind
          fi

      - name: Build Pagefind search index
        if: ${{ !contains(github.event.head_commit.message, '[skip-pagefind]') && steps.pagefind-cache.outputs.cache-hit != 'true' }}
        run: |
          # Set paths for CI environment
          export CBETA_XML_DIR=corpus/CbetaZenTexts/xml-p5
          export OPENZEN_XML_DIR=corpus/OpenZenTexts/xml-open
          export CBETA_TITLES=corpus/CbetaZenTranslations/titles.jsonl
          export OPENZEN_TITLES=corpus/OpenZenTranslations/titles.jsonl
          export CBETA_TRANSLATED_DIR=corpus/CbetaZenTranslations/xml-p5t
          export OPENZEN_TRANSLATED_DIR=corpus/OpenZenTranslations/xml-open-t
          export ZEN_TEXTS_PATH=corpus/CbetaZenTranslations/zen_texts.json
          export COMMUNITY_DIR=corpus/CbetaZenTranslations/community/translations
          node --expose-gc build/build-pagefind-index.js
        env:
          NODE_OPTIONS: --max-old-space-size=7168

      - name: Verify Pagefind exists
        run: |
          if [ ! -d pagefind ] || [ ! -f pagefind/pagefind-entry.json ]; then
            echo "ERROR: No Pagefind index available. The build may have OOMed."
            echo "To deploy without rebuilding: add [skip-pagefind] to your commit message"
            echo "and ensure a previous successful build cached the index."
            exit 1
          fi
          echo "Pagefind index OK: $(ls pagefind/ | wc -l) files"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=readzen
