<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=/">
    <script>
        // Cloudflare Pages fallback: redirect any non-root path to the SPA
        // root with the original path as a hash, so app.js can parse it.
        var path = window.location.pathname + window.location.search;
        window.location.replace('/#' + path);
    </script>
</head>
<body></body>
</html>
