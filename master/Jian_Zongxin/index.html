<h1>Ji'an Zongxin 及庵宗信</h1>
<p>School: Linji | d. 1320 | Teacher: Xueyan Zuqin | Students: Pingshan Chulin, Shiwu Qinggong</p>
<p>Yuan dynasty Linji master, dharma heir of Xueyan Zuqin and dharma brother of Gaofeng Yuanmiao. Teacher of both Shiwu Qinggong and Pingshan Chulin, making him the indirect ancestor of all late-Goryeo Korean Seon. Active at Xifeng Temple (Jianyang) and Daochang Mountain Wanshou Temple (Huzhou). Attested in DILA Authority Database (A021593).</p>
