<h1>Doseon 道詵</h1>
<p>School: Korean Seon | 827-898 | Teacher: Hyejeol</p>
<p>Korean Seon monk and master geomancer (pungsu) who profoundly shaped the political geography of Korea. Trained in both Seon meditation and Chinese geomantic arts (fengshui), he applied topographical analysis to temple and capital siting. His prophecies regarding the decline of Silla and the rise of a new dynasty at Songak (modern Kaesong) were later credited with guiding Wang Geon's founding of the Goryeo dynasty (918). He founded or restored numerous temples based on geomantic principles. Though his geomantic legacy sometimes overshadows his Buddhist teaching, he was recognized as a legitimate Seon master. Attested in Goryeo-era hagiographies: credited with prophecies that legitimized the Goryeo founding, with his geomantic writings preserved in the Doseon bigi.</p>
