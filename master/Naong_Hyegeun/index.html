<h1>Naong Hyegeun 懶翁慧勤</h1>
<p>School: Korean Seon | 1320-1376 | Teacher: Pingshan Chulin | Students: Muhak Jacho, Gobong Beopjang</p>
<p>One of the most celebrated Korean Seon masters of the late Goryeo dynasty, remarkable for having received dharma transmission from two masters of entirely different lineages. He first studied under the Indian monk Zhigong (Dhyanabhadra, d. 1363), who had come to Yuan China and gave Naong transmission in an Indian-derived lineage. He then received a second transmission from the Chinese Linji master Pingshan Chulin, a heir in the mainstream Yangqi-Linji line. This double transmission from both Indian and Chinese sources gave Naong unique authority. He became Royal Teacher (wangsa) and initiated major reforms of Korean Seon before his sudden death. Attested in Korean Buddhist records and Chinese Chan genealogies: both transmissions are documented, with his Indian lineage through Zhigong preserved in Goryeo-era inscriptions.</p>
