<h1>Cheongbong Geoan é¯‘å³°å·Øå²ø</h1>
<p>School: Korean Seon | 1710-1793 | Teacher: Hoam Chejeong | Students: Yulbong Cheonggo</p>
<p>Mid-18th century Seon master in the Pyeonyang lineage. One of the few masters in the Hwanseong-to-Gyeongheo chain with attested dates (1710-1793). The 69th Korean patriarch. Carried the lineage through the deepest period of Joseon Neo-Confucian suppression of Buddhism.</p>
