<h1>Jukong Qibin 俱空契斌</h1>
<p>School: Caodong | d. 1452 | Teacher: Ningran Liaogai | Students: Wufang Kecong</p>
<p>Seventh-generation Shaolin Caodong master, heir of Ningran Liaogai. Served as abbot of Shaolin Monastery in the early-to-mid Ming dynasty, continuing the unbroken Caodong transmission established by Xueting Fuyu.</p>
