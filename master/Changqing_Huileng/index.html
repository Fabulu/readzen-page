<h1>Changqing Huileng 長慶慧稜</h1>
<p>School: Chan | 854-932 | Teacher: Xuefeng Yicun</p>
<p>From Yanzhou in Zhejiang. Studied under Xuefeng Yicun for twenty-nine years and famously wore out seven meditation cushions before awakening upon rolling up a bamboo screen. Later headed Changqing Monastery in Fuzhou for twenty years. Appears in Blue Cliff Record cases 22 and 23.</p>
