<h1>Xianglin Chengyuan 香林澄遠</h1>
<p>School: Yunmen | 908-987 | Teacher: Yunmen Wenyan | Students: Zhimen Guangzuo</p>
<p>From Mianzhu in Sichuan. Served as Yunmen Wenyan's attendant for eighteen years; Yunmen's only teaching method was to call his name and shout 'What is this?' Together with Mingjiao, he recorded Yunmen's sayings in writing. Later transmitted the lineage to Zhimen Guangzuo. Appears in Blue Cliff Record case 17.</p>
