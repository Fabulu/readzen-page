<h1>Chushi Fanqi 楚石梵琦</h1>
<p>School: Linji | 1296-1370 | Teacher: Yuansou Xingduan</p>
<p>Ordained at age nine at Tianning Temple in Haiyan, Zhejiang. Studied calligraphy under Zhao Mengfu and became one of the foremost Chan poet-monks of the Yuan dynasty, composing over a hundred Pure Land poems. Yunqi Zhuhong later ranked him first among the most eminent monks of the era.</p>
