<h1>Chunzuo Wencai 淳拙文才</h1>
<p>School: Caodong | d. 1352 | Teacher: Huanyuan Fuyu | Students: Songting Ziyan</p>
<p>Fourth-generation Shaolin Caodong master, dharma heir of Huanyuan Fuyu. Served as abbot of Shaolin Monastery during the mid-Yuan dynasty, continuing the Caodong lineage that would persist at Shaolin into the Ming.</p>
