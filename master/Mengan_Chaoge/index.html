<h1>Meng'an Chaoge 夢庵超格</h1>
<p>School: Linji | 1639-1708 | Teacher: Maoxi Xingsen | Students: Jialing Xingyin</p>
<p>Linji heir of Maoxi Xingsen in the Yulin Tongxiu line. Taught at Li'an monastery in Hangzhou and later became abbot of Bailin monastery in Beijing. His student Jialing Xingyin became the Chan teacher of the Yongzheng Emperor.</p>
