<h1>Jiashan Shanhui 夾山善會</h1>
<p>School: Chan | 805-881 | Teacher: Chuanzi Decheng</p>
<p>Originally a sutra lecturer in Guangzhou; redirected to study with the boatman-monk Chuanzi Decheng, who pushed him into the river, triggering his awakening. He then established a major monastery on Mount Jia (Jiashan) in Hunan, where he taught for decades. His heir Luopu Yuanan carried his transmission forward.</p>
