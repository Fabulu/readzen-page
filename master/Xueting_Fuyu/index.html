<h1>Xueting Fuyu йӣӘеәӯзҰҸиЈ•</h1>
<p>School: Caodong | 1203-1275 | Teacher: Wansong Xingxiu | Students: Lingyin Wentai</p>
<p>Most historically consequential heir of Wansong. Appointed by Kublai Khan to restore Shaolin Monastery, where he installed the Caodong lineage as the dominant transmission. Composed the 70-character generation poem still used to name Shaolin monks today, institutionalizing the lineage. Through him, Wansong's line became the 'unbroken' Shaolin Caodong transmission surviving to the present.</p>
<p>References: <a href="https://en.wikipedia.org/wiki/Xueting_Fuyu">Wikipedia</a> | <a href="https://terebess.hu/zen/mesterek/XuetingFuyu.html">Terebess</a></p>
