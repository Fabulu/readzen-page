<h1>Gaofeng Yuanmiao 高峰原妙</h1>
<p>School: Linji | 1238-1295 | Teacher: Xueyan Zuqin | Students: Zhongfeng Mingben, Yuansou Xingduan, Shiwu Qinggong</p>
<p>Lived on Tianmu mountain in a hermitage. Writings on the huatou (critical phrase) method and 'great doubt' highly influential.</p>
