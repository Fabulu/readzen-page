<h1>Niutou Zhiyan зЙЫй†≠жЩЇеЈМ</h1>
<p>School: Niutou | 600-677 | Teacher: Niutou Farong | Students: Niutou Huifang</p>
<p>Second patriarch of the Niutou (Oxhead) school. He trained under Farong at Mount Niutou and formalized the contemplative practices Farong had developed, emphasizing the teaching that all dharmas are empty and that the mind-ground is originally pure. He appears in the Jingde Chuandeng Lu (juan 4).</p>
