<h1>Linji Yixuan 臨濟</h1>
<p>School: Linji | 810-866 | Teacher: Huangbo Xiyun | Students: Xinghua Cunjiang, Sansheng Huiran, Baoshou Yanzhao, Luopu Yuanan</p>
<p>Founder of the Linji (Rinzai) school, one of only two Chan lineages surviving to the present. Asked Huangbo three times about the essence of Buddhism and was beaten each time; enlightened after visiting Gaoan Dayu. Known for radical pedagogy: shouts (喝), blows, and paradoxical statements. Developed 'four shouts' and 'four positions of host and guest' frameworks. His recorded sayings (臨濟錄) compiled by Sansheng Huiran are foundational to the koan tradition.</p>
