<h1>Changqing Da'an 長慶大安</h1>
<p>School: Hongzhou | 793-883 | Teacher: Baizhang Huaihai | Students: Dasui Fazhen</p>
<p>Dharma heir of Baizhang Huaihai and dharma brother of Guishan Lingyou. Nicknamed 'Lazy An' (懶安) for his unhurried manner. After Guishan Lingyou's death in 853, was invited to assume the abbacy at Mt. Gui. Famous for the 'water buffalo' metaphor: 'I am like a water buffalo — if someone calls me a water buffalo, I am a water buffalo.' Teacher of Dasui Fazhen.</p>
<p>References: <a href="https://terebess.hu/zen/mesterek/ChangqingDaan.html">Terebess</a> | <a href="https://pl.wikipedia.org/wiki/Changqing_Da%27an">Wikipedia (PL)</a></p>
