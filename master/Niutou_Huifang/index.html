<h1>Niutou Huifang 牛頭慧方</h1>
<p>School: Niutou | 629-695 | Teacher: Niutou Zhiyan | Students: Niutou Fachi</p>
<p>Third patriarch of the Niutou school. He resided at Mount Niutou continuing the tradition established by Farong and Zhiyan. Under his stewardship the Niutou community maintained its independence from the northern and southern Chan lineages centered on Hongren's successors.</p>
