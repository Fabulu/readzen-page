<h1>Touzi Datong 投子大同</h1>
<p>School: Chan | 819-914 | Teacher: Cuiwei Wuxue</p>
<p>Heir of Cuiwei Wuxue, from Shuzhou in Anhui. Settled on Mount Touzi and lived there as a hermit for over thirty years, drawing many students. Visited by Zhaozhou Congshen in a famous encounter. Appears in Blue Cliff Record cases 41, 79, 80, and 91.</p>
