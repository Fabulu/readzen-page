<h1>Nanyuan Huiyong 南院慧顒</h1>
<p>School: Linji | 860-930 | Teacher: Xinghua Cunjiang | Students: Fengxue Yanzhao</p>
<p>From Hebei. Taught at the South Hall (Nanyuan) of Baoying Monastery in Ruzhou with an extremely strict, confrontational style. Critical link in the Linji lineage: only through his line (via Fengxue Yanzhao) did Linji's transmission survive to modern times.</p>
