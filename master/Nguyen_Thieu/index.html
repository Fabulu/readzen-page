<h1>Nguyen Thieu 元韶</h1>
<p>School: Linji | 1648-1728 | Teacher: Kuangyuan Benguo</p>
<p>Chinese monk from Chaozhou, Guangdong who brought Linji Chan to Vietnam in 1665. Founded Thap Thap Di Da Temple and Quoc An Temple in Hue. 33rd generation Linji. Patronized by the Nguyen lords. His lineage (Lam Te) remains one of the largest in Vietnamese Buddhism.</p>
