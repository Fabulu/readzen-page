<h1>Baofu Congzhan 保福從展</h1>
<p>School: Chan | 860-928 | Teacher: Xuefeng Yicun</p>
<p>Heir of Xuefeng Yicun and close dharma brother of Changqing Huileng, with whom he appears in paired dialogues. Produced twenty-six dharma heirs, making him one of Xuefeng's most prolific successors. Appears in Blue Cliff Record cases 8, 22, 23, 76, 91, 95 and Book of Serenity case 71.</p>
