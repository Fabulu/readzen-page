<h1>Qiyuan Xinggang 祇園行剛</h1>
<p>School: Linji | 1597-1654 | Teacher: Shiche Tongcheng | Students: Yigong, Yikui Chaochen</p>
<p>One of the most prominent female Chan masters in Chinese history. A Linji heir of Shiche Tongcheng, she became abbess of Crouching Lion (Fuwo) Chan Monastery, which flourished under her leadership. She left seven female dharma heirs, and her recorded sayings and poems survive in full.</p>
