<h1>Hwanseong Jian 喚醒志安</h1>
<p>School: Korean Seon | 1664-1729 | Teacher: Woldam Seoljye | Students: Hoam Chejeong</p>
<p>Major 18th-century figure. Authored Seonmun ojonggangyo (Essentials of the Five Schools of Seon), which systematized Korean Seon doctrine. Was exiled after a controversy. The Jogye Order's kanhwa Seon tradition traces through him.</p>
