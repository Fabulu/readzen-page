<h1>Ehu Dayi 鵝湖大義</h1>
<p>School: Hongzhou | 746-818 | Teacher: Mazu Daoyi</p>
<p>First Hongzhou school master to teach in the Tang capital Chang'an. Won an imperial debate in 796 at the Linde Hall, expelling Northern Chan rivals and opening the capital to the southern school. Taught Emperors Dezong and Shunzong. Author of the Zuochan ming (Inscription on Sitting Meditation). Born in Quzhou (Zhejiang), surname Xu, reportedly of Korean ancestry. Posthumous title: Huijue Dashi.</p>
