<h1>Weilin Daopei 為霖道霈</h1>
<p>School: Caodong | 1615-1702 | Teacher: Yongjue Yuanxian</p>
<p>Only dharma heir of Yongjue Yuanxian. Established Gushan Yongquan Monastery as a hereditary Caodong dharma-transmission seat. The Gushan Caodong line continued through his successors for 250 years, eventually producing Xuyun.</p>
