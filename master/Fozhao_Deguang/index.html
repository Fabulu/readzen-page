<h1>Fozhao Deguang 佛照德光</h1>
<p>School: Linji | 1121-1203 | Teacher: Dahui Zonggao</p>
<p>One of Dahui Zonggao's most prominent dharma heirs. Served as abbot at major Southern Song monasteries including Ayuwang (Ashoka) Temple and Lingyin Temple in Hangzhou. He also transmitted Dahui's kanhua Chan (keyword meditation) method to the next generation.</p>
