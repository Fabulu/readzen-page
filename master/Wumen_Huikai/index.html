<h1>Wumen Huikai з„Ўй–Ђ</h1>
<p>School: Linji | 1183-1260 | Teacher: Yuelin Shiguan</p>
<p>Compiler of the Wumenguan (з„Ўй–Ђй—њ, Gateless Barrier), the most widely studied koan collection. Attained awakening after six years of working on Zhaozhou's 'No'. The Wumenguan's 48 cases with verse commentary became central to Rinzai training.</p>
