<h1>Cishou Huaishen 慈受懷深</h1>
<p>School: Yunmen | 1077-1132 | Teacher: Jingzhao Chongxin</p>
<p>Northern Song Yunmen master who served as abbot of several major monasteries. Renowned poet-monk whose verse explored how nondual insight applies to ethical decision-making in everyday life. His recorded sayings (yulu) circulated widely among Song literati.</p>
