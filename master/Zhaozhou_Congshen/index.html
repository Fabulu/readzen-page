<h1>Zhaozhou Congshen 趙州</h1>
<p>School: Hongzhou | 778-897 | Teacher: Nanquan Puyuan</p>
<p>One of the most celebrated Chan masters, appearing in more koans than any other figure. Met Nanquan at age 18, studied under him over 20 years. At 80, settled at the dilapidated Guanyin Temple in Zhaozhou where he taught for 40 more years. Famous for 'No' (無), 'wash your bowl', 'the cypress tree in the garden', and 'have a cup of tea' (喫茶去). Lived to 120. His lineage died out by c. 1000 CE, but his recorded sayings (趙州錄) preserved his enormous influence.</p>
