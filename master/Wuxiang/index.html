<h1>Wuxiang 無相</h1>
<p>School: Chan | 684-762 | Teacher: Zizhou Chuji | Students: Baotang Wuzhu</p>
<p>Korean prince of the Silla royal house who became one of the most influential Chan teachers in eighth-century Sichuan. Ordained under Zizhou Chuji (a disciple of Zhishen in the Hongren/East Mountain line), he built a massive congregation in Chengdu around his 'three phrases' (wunian, moyi, mowang) teaching of no-thought, no-recollection, and no-delusion. His liturgical innovations blending Chan with Vinaya confession rites shaped a distinct Sichuan Chan tradition. Buswell (1989) argues he was an early formative influence on the young Mazu Daoyi before Mazu's move east. His legacy was continued by Baotang Wuzhu, though the Baotang school radicalized his teachings. Attested in Lidai fabao ji (c. 774) and Zutangji (952): both record his teaching career in Sichuan, his royal Silla origins, and his three-phrase doctrine.</p>
