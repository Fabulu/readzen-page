<h1>Yunmen Wenyan 雲門</h1>
<p>School: Yunmen | 864-949 | Teacher: Xuefeng Yicun | Students: Dongshan Shouchu, Xianglin Chengyuan, Baling Haojian</p>
<p>Founder of the Yunmen school. Born 864 in Jiaxing. Enlightened when Muzhou slammed the gate on his leg. Established Yunmen Monastery on Yunmen Mountain in Guangdong with 500+ monks. Known for terse, one-word answers: 'A dried shit-stick.' Famous for 'every day is a good day.' His mummified body was preserved.</p>
