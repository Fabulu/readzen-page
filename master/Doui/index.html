<h1>Doui 道義</h1>
<p>School: Korean Seon | 770-825 | Teacher: Xitang Zhizang | Students: Chejing</p>
<p>First Korean monk to transmit the Seon (Chan) lineage to the Korean peninsula, inaugurating the 'Nine Mountains' Seon movement. He traveled to Tang China and studied under Xitang Zhizang, a direct heir of Mazu Daoyi, receiving formal dharma transmission. Upon returning to Silla, he found the doctrinal Buddhist establishment hostile to Seon and was unable to teach openly during his lifetime. His disciple Yomgo later founded the Gaji Mountain school (Silsangsa), the first of the Nine Mountains Seon lineages. Doui is thus honored as the patriarch who planted Seon in Korean soil, even though its flowering came after his death. Attested in Zutangji (952): records his study under Xitang Zhizang with a transmission dialogue confirming his awakening.</p>
