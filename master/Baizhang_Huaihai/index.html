<h1>Baizhang Huaihai 百丈</h1>
<p>School: Hongzhou | 720-814 | Teacher: Mazu Daoyi | Students: Huangbo Xiyun, Guishan Lingyou, Wufeng, Changqing Da'an</p>
<p>Established the first independent Chan monastic code (百丈清規), revolutionizing Chan communal life. Famous for 'a day without work is a day without food' (一日不作一日不食). Subject of the wild fox koan. His monastic regulations became the model for all later Chan/Zen monasteries.</p>
