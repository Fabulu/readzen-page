<h1>Baegun Gyeonghan 白雲景閑</h1>
<p>School: Korean Seon | 1298-1374 | Teacher: Shiwu Qinggong</p>
<p>Korean Seon master best known as the compiler and printer of the Jikji simche yojeol (Anthology of Great Buddhist Priests' Zen Teachings), printed at Heungdeoksa temple in Cheongju in 1377 using movable metal type. This is the oldest known book in the world printed with movable metal type, predating Gutenberg's Bible by 78 years. Baegun traveled to Yuan China and received transmission from Shiwu Qinggong (Stone House), the hermit-poet of Tianmu mountain. His Jikji compiled essential Seon teachings from the patriarchs and was intended as a practical guide for practitioners. Attested in UNESCO Memory of the World Register (2001): the Jikji is recognized as the world's oldest extant movable metal type printed book, with the surviving second volume held by the Bibliotheque nationale de France.</p>
<p>References: <a href="https://en.wikipedia.org/wiki/Baegun">Wikipedia</a> | <a href="https://en.unesco.org/memoryoftheworld/registry/258">UNESCO Jikji</a></p>
