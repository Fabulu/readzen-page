<h1>Longya Judun йҫҚзүҷеұ…йҒҒ</h1>
<p>School: Caodong | 835-923 | Teacher: Dongshan Liangjie</p>
<p>From Nancheng in Fuzhou (Jiangxi). Ordained at fourteen, studied eight years under Dongshan Liangjie, and also visited Linji and Cuiwei Wuxue. Later became abbot of Miaoji Temple on Mount Longya near Changsha. Posthumous title: Great Master Zhengkong. Appears in Blue Cliff Record case 20.</p>
