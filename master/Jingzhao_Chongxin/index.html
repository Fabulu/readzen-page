<h1>Jingzhao Chongxin 淨照崇信</h1>
<p>School: Yunmen | 1050-1100 | Teacher: Huilin Zongben | Students: Cishou Huaishen</p>
<p>Northern Song Yunmen master who maintained the lineage between Xuedou Chongxian and the school's late Northern Song figures. His role was crucial in keeping the Yunmen transmission alive during a period when the Linji school was rapidly becoming dominant. He transmitted the Yunmen dharma to Cishou Huaishen.</p>
