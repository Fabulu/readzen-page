<h1>Sushan Kuangren 疏山匡仁</h1>
<p>School: Caodong | 837-909 | Teacher: Dongshan Liangjie</p>
<p>Heir of Dongshan Liangjie, nicknamed 'Uncle Dwarf.' Fellow students regarded him as the most penetrating among Dongshan's disciples and would say 'let's just go ask Uncle Dwarf' when difficult questions arose. Known for 'the price of the dharma body' exchange.</p>
