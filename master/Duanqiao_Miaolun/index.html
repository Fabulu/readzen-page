<h1>Duanqiao Miaolun ŠľĚŠęőňŽÖňÇź</h1>
<p>School: Linji | 1201-1261 | Teacher: Wuzhun Shifan</p>
<p>Dharma heir of Wuzhun Shifan who served as abbot at Jingci Temple in Hangzhou, one of the Five Mountains monasteries. He gave Gaofeng Yuanmiao two of his most important huatou, including 'The myriad dharmas return to one - where does the one return to?' which triggered Gaofeng's awakening in a dream. While Gaofeng formally received transmission from Xueyan Zuqin (Duanqiao's dharma brother), Duanqiao's direct role in shaping Gaofeng's practice was indispensable.</p>
