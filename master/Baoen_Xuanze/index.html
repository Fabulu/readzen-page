<h1>Baoen Xuanze е ±жЃ©зЋ„е‰‡</h1>
<p>School: Fayan | 920-957 | Teacher: Fayan Wenyi</p>
<p>Originally from Weinan in Huazhou (present-day Hua County, Henan). First studied under Qingfeng, then continued under Fayan Wenyi. His enlightenment came through the famous &quot;fire boy seeking fire&quot; exchange: after Qingfeng told him the fire boy comes seeking fire, Fayan rejected his intellectual understanding, and when he returned to ask again, he achieved deep awakening. He served as abbot of Baoen Monastery in Jinling (modern Nanjing), capital of the Southern Tang kingdom.</p>
