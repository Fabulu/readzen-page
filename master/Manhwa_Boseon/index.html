<h1>Manhwa Boseon 萬化普善</h1>
<p>School: Korean Seon | Teacher: Yeongwol Bongyul | Students: Gyeongheo Seongu</p>
<p>The 74th Korean patriarch. Lecturer on Buddhist doctrine at Donghaksa Monastery on Gyeryongsan Mountain near Daejeon. Took in the teenage Gyeongheo after Venerable Gyeheo left the order, teaching him the doctrinal curriculum. Gyeongheo later told followers to honor Manhwa as the one 'from whom I received the work of the dharma.'</p>
