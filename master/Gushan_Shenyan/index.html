<h1>Gushan Shenyan 鼓山神晏</h1>
<p>School: Chan | 860-944 | Teacher: Xuefeng Yicun</p>
<p>Heir of Xuefeng Yicun. In 908, Min kingdom ruler Wang Shenzhi appointed him to supervise the reconstruction of Yongquan Temple on Gushan (Drum Mountain) in Fuzhou, where he served as abbot and established a lasting Chan lineage in Fujian.</p>
