<h1>Yongzheng Emperor 雍正帝</h1>
<p>School: Linji | 1678-1735 | Teacher: Jialing Xingyin</p>
<p>The only Chinese emperor to claim Chan enlightenment. Compiled the Yuxuan yulu (1733), a 19-fascicle anthology of Chan recorded sayings. Authored Jianmo bianyi lu, banning Hanyue Fazang's works and settling the Miyun-Hanyue controversy in Miyun's favor. Lay Buddhist name Yuanming jushi. Reshaped Chan orthodoxy by imperial decree.</p>
