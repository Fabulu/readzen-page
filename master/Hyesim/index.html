<h1>Hyesim ę…§č«¶</h1>
<p>School: Korean Seon | 1178-1234 | Teacher: Jinul | Students: Mongyeo</p>
<p>Jinul's foremost disciple and second master of Songgwangsa. He compiled a collection of 1,125 kongan (koans) titled the Seonmun yeomsong seolhwa (Seon Verses and Commentaries), the first indigenous Korean koan anthology. This monumental work, completed in thirty fascicles, selected cases from Chinese Chan collections and added Korean commentary, establishing an independent Korean Seon literary tradition distinct from mere importation of Chinese texts. He also expanded Songgwangsa's monastic community and received the posthumous title 'National Teacher' (guksa). His koan collection remained central to Korean Seon training for centuries. Attested in Korean Buddhist historical records: the Seonmun yeomsong seolhwa is the first indigenous Korean koan collection, predating comparable Japanese efforts.</p>
