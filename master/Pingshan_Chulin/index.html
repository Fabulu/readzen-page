<h1>Pingshan Chulin 平山處林</h1>
<p>School: Linji | 1279-1361 | Teacher: Ji'an Zongxin | Students: Naong Hyegeun</p>
<p>Yuan dynasty Linji master, 19th generation (not 18th as sometimes claimed in Korean sources). Dharma brother of Shiwu Qinggong — both studied under Ji'an Zongxin. Gave formal dharma transmission to the Korean monk Naong Hyegeun at Jingci Temple in Hangzhou. Also served as abbot of Lingyin Temple. Authored Jingjuyin (淨居吟), over 200 poems. Attested in DILA Authority Database (A016698).</p>
