<h1>Bodhidharma 達磨</h1>
<p>School: Early Chan | 500-535 | Teacher: Prajnatara | Students: Huike, Daoyu</p>
<p>First Patriarch of Chan and traditionally the 28th Indian patriarch. Born as a prince in southern India, possibly of the Pallava dynasty. Arrived in China c. 520, reportedly met Emperor Wu of Liang who asked about the merit of his works; Bodhidharma replied 'no merit.' Settled at Shaolin Temple on Mount Song, where tradition says he sat in wall-gazing meditation (壁觀) for nine years. His teaching emphasized direct transmission outside scriptures. Named Huike his dharma heir after Huike demonstrated wordless understanding.</p>
