<h1>Lao'an 嵩嶽慧安</h1>
<p>School: Early Chan | 582-709 | Teacher: Hongren</p>
<p>Born in Jingzhou (Hubei Province). Already in his forties, he traveled to Huangmei where he studied under both Daoxin and Hongren, maturing as a practitioner of the East Mountain School. After time at Jade Spring Monastery alongside Shenxiu, he settled permanently on Mount Song (Songshan). Listed in the Lengqie Shizi Ji alongside Shenxiu and Huineng as one of Hongren's principal dharma heirs. He represents a third stream from the Fifth Patriarch, distinct from both the Northern and Southern schools. Said to have lived to age 128.</p>
