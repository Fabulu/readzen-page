<h1>Mazu Daoyi 馬祖</h1>
<p>School: Hongzhou | 709-788 | Teacher: Nanyue Huairang | Students: Baizhang Huaihai, Nanquan Puyuan, Xitang Zhizang, Dazhu Huihai, Panshan Baoji, Zhangjing Huaihui, Xingshan Weikuan, Fenzhou Wuye, Mayu Baoche, Damei Fachang, Guizong Zhichang, Yanguan Qi'an, Jinniu Heshang, Ehu Dayi</p>
<p>One of the most influential Tang dynasty Chan masters. Born 709 in Sichuan. Founded the Hongzhou school, producing 139 dharma heirs. Known for 'this mind is Buddha' (即心是佛) and 'ordinary mind is the Way' (平常心是道). Pioneer of unconventional teaching methods including shouts and blows.</p>
