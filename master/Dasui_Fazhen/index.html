<h1>Dasui Fazhen 大隨法真</h1>
<p>School: Hongzhou | 834-919 | Teacher: Changqing Da'an</p>
<p>Best known for the Kalpa Fire koan (BCR 29, BOS 30): 'When the great fire at the end of the kalpa destroys the universe, is this destroyed or not?' — 'Destroyed.' Touzi Datong called him 'the Ancient Buddha of West River.' Lived for over ten years in a hollow tree on Mt. Dasui in Sichuan, then ran a tea stall by the road. Also studied with Dongshan Liangjie and Yunyan Tansheng.</p>
<p>References: <a href="https://terebess.hu/zen/dasui.html">Terebess</a> | <a href="https://pl.wikipedia.org/wiki/Dasui_Fazhen">Wikipedia (PL)</a> | <a href="https://www.bluecliffrecord.ca/case-29-dasuis-world-ending-fire/">BCR 29 (Blue Cliff Record)</a> | <a href="https://everydayzen.org/teachings/dasuis-aeonic-fire-case-30-book-of-serenity/">BOS 30 (Everyday Zen)</a> | <a href="https://cbetaonline.dila.edu.tw/T51n2076_011">CBETA (Chuandeng Lu juan 11)</a></p>
