<h1>Yujeong 惟政</h1>
<p>School: Korean Seon | 1544-1610 | Teacher: Hyujeong</p>
<p>Hyujeong's foremost disciple, celebrated equally as a Seon master, military commander, and diplomat. During the Imjin War (1592-1598), he led monk-soldiers in combat against the Japanese forces, distinguishing himself at several engagements. After the war, he was sent to Japan as an envoy in 1604 and successfully negotiated the return of approximately 3,500 Korean prisoners of war, a diplomatic feat that made him a national hero. His combination of martial valor and diplomatic skill during Korea's greatest military crisis cemented the image of Buddhist monks as defenders of the nation, counterbalancing the Neo-Confucian narrative that Buddhism was socially useless. Attested in Joseon wangjo sillok and Japanese records: his diplomatic mission to Japan and the repatriation of prisoners are documented in both Korean and Japanese sources.</p>
