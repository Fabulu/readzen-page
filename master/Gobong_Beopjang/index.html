<h1>Gobong Beopjang 孤峰法藏</h1>
<p>School: Korean Seon | 1350-1428 | Teacher: Naong Hyegeun</p>
<p>Naong Hyegeun's primary dharma heir and the master who rebuilt Songgwangsa, the 'Sangha Jewel Temple' originally established by Jinul. During the late Goryeo and early Joseon transition, he preserved the Seon monastic community through a period of political upheaval and growing anti-Buddhist sentiment from Neo-Confucian reformers. His reconstruction of Songgwangsa ensured the physical and institutional survival of the Jinul-Hyesim legacy. He maintained the unified Jogye lineage established by Taego Bou, transmitting it into the fifteenth century. Attested in Songgwangsa temple records: his rebuilding efforts and dharma lineage from Naong are preserved in monastery inscriptions and chronicles.</p>
