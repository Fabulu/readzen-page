<h1>Sinhaeng 神行</h1>
<p>School: Korean Seon | 704-779 | Teacher: Beomnang | Students: Junbeom</p>
<p>Early Korean Seon figure (704-779). First studied under Beomnang at Mt. Hogeo, then traveled to Tang China and received transmission from Chigong (a Korean disciple of Puji of the Northern School). Bridges the Beomnang lineage with the Northern School tradition. Attested in the Jijeungdaesa stele (893 CE, composed by Choe Chiwon).</p>
