<h1>Nanta Guangyong 南塔光涌</h1>
<p>School: Guiyang | 850-938 | Teacher: Yangshan Huiji | Students: Bajiao Huiqing</p>
<p>Heir of Yangshan Huiji, taught at the South Pagoda (Nanta) on Mount Yangshan in Jiangxi. Transmitted the Guiyang lineage to Bajiao Huiqing, a Korean monk who traveled to China seeking instruction, keeping the school alive for one more generation.</p>
