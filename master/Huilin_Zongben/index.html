<h1>Huilin Zongben 慧林宗本</h1>
<p>School: Yunmen | 1020-1099 | Teacher: Tianyi Yihuai | Students: Jingzhao Chongxin</p>
<p>Also known as Yuanzhao Zongben. Dharma heir of Tianyi Yihuai who first taught at Ruiguang Monastery in Suzhou, then served as abbot of Jingci Monastery in Hangzhou where over a thousand disciples gathered. Later served at imperially sponsored monasteries in the Northern Song capital Kaifeng, including Huilin Monastery. Together with his student Shanben, they were known as &quot;Big and Little Ben.&quot; He was one of the most prestigious Buddhist monks of his generation.</p>
<p>References: <a href="https://uhpress.hawaii.edu/title/how-zen-became-zen/">How Zen Became Zen</a></p>
