<h1>Tianyi Yihuai 天衣義懷</h1>
<p>School: Yunmen | 993-1064 | Teacher: Xuedou Chongxian | Students: Huilin Zongben</p>
<p>One of Xuedou Chongxian's most important dharma heirs. He taught at Tianyi Monastery in Zhejiang and continued Xuedou's literary-poetic Chan. Through his student Huilin Zongben, who became abbot of the imperially sponsored Xiangguo Monastery in Kaifeng, his branch maintained a significant Yunmen institutional presence into the late 11th century.</p>
<p>References: <a href="https://en.wikipedia.org/wiki/Yunmen_school">Wikipedia (Yunmen school)</a> | <a href="https://uhpress.hawaii.edu/title/how-zen-became-zen/">How Zen Became Zen</a></p>
