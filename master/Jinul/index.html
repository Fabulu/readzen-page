<h1>Jinul 知訥</h1>
<p>School: Korean Seon | 1158-1210 | Teacher: Dahui Zonggao | Students: Hyesim</p>
<p>Founder of the Jogye Order, the dominant school of Korean Buddhism to the present day. Uniquely among Chan/Seon masters, Jinul achieved three distinct awakenings entirely through reading texts rather than through face-to-face transmission: first from the Platform Sutra, then from Li Tongxuan's commentary on the Avatamsaka Sutra, and finally from Dahui Zonggao's letters on hwadu (huatou) practice. He synthesized 'sudden awakening followed by gradual cultivation' (dono jeomsu) as the normative Seon path, harmonizing Seon meditation with Hwaom (Huayan) doctrinal study. He revitalized Korean Buddhism from his base at Songgwangsa, which he rebuilt as a 'community of the Samgha jewel.' Attested in Buswell (1991), The Korean Approach to Zen: the definitive English-language study of his thought and legacy.</p>
<p>References: <a href="https://en.wikipedia.org/wiki/Jinul">Wikipedia</a> | <a href="https://www.amazon.com/Tracing-Back-Radiance-Chinuls-Approach/dp/0824814274">Buswell (1991)</a></p>
