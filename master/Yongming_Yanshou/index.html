<h1>Yongming Yanshou 永明延壽</h1>
<p>School: Fayan | 904-975 | Teacher: Tiantai Deshao</p>
<p>Third patriarch of the Fayan school and author of the Zongjing Lu (宗鏡錄, Record of the Mirror of the School) in 100 fascicles, one of the most comprehensive Chan works ever composed. Student of Tiantai Deshao. Served as abbot of Yongming Monastery in Hangzhou.</p>
