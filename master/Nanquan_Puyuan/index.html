<h1>Nanquan Puyuan 南泉</h1>
<p>School: Hongzhou | 748-835 | Teacher: Mazu Daoyi | Students: Zhaozhou Congshen, Changsha Jingcen, Zihu Lizong, Luzu, Doyun</p>
<p>One of Mazu's 'three great disciples'. Often called 'Old Teacher Wang' (王老師). After enlightenment under Mazu, retreated to Mount Nanquan for 30 years. Famous for killing the cat (南泉斬貓) and 'ordinary mind is the Way' (平常心是道). Had seventeen dharma heirs.</p>
