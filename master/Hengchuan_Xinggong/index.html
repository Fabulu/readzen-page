<h1>Hengchuan Xinggong 橫川行珩</h1>
<p>School: Linji | 1222-1289 | Teacher: Wuzhun Shifan</p>
<p>Dharma heir of Wuzhun Shifan representing a second major branch of the Wuzhun lineage, distinct from the Xueyan Zuqin branch that produced Gaofeng and Zhongfeng. Through his student Gulin Qingmao, he produced a major branch of the Yuan-period Linji transmission.</p>
