<h1>Pyeonyang Eongi жъГуЙітйдТЕЪ</h1>
<p>School: Korean Seon | 1581-1644 | Teacher: Hyujeong | Students: Pungdam Uisim</p>
<p>Founded the Pyeonyang-pa, the dominant branch through which ALL modern Jogye Order lineage traces. War lieutenant during the Imjin War (1592-98). More significant for lineage than his dharma brother Yujeong/Samyeong, who was more famous as diplomat.</p>
