<h1>Beomil 梵日</h1>
<p>School: Korean Seon | 810-889 | Teacher: Yanguan Qi'an</p>
<p>Founder of the Sagulsan (Mount Sagul) school, one of the Nine Mountains Seon lineages of Korea. He traveled to Tang China and trained under Yanguan Qi'an, a direct disciple of Mazu Daoyi, practicing for six years before receiving dharma transmission. Returning to Silla, he established Gulsan Monastery as his base and built one of the most active Seon communities of ninth-century Korea. His lineage maintained strong ties with the Mazu school's emphasis on everyday-mind-is-the-Way. He received lavish royal patronage, and his stele inscription is an important source for early Korean Seon. Attested in Zutangji (952): records his awakening under Yanguan Qi'an after six years of practice.</p>
