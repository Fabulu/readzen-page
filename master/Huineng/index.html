<h1>Huineng 慧能</h1>
<p>School: Early Chan | 638-713 | Teacher: Hongren | Students: Nanyue Huairang, Qingyuan Xingsi, Shenhui, Nanyang Huizhong, Yongjia Xuanjue, Wujin Zang, Zhitong</p>
<p>Sixth Patriarch and pivotal figure in Chan history. Born 638 in Xinzhou, Guangdong, to a poor family. Received secret transmission from Hongren after composing a verse demonstrating sudden awakening. His Platform Sutra (六祖壇經) established the 'sudden awakening' teaching. All surviving Chan/Zen lineages descend through his five principal dharma heirs. His mummified body is preserved at Nanhua Temple.</p>
